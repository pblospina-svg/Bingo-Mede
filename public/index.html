<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<title>Bingo Medellín</title>

<style>

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    color: rgb(0, 0, 0);
    text-align: center;
    margin: 0;
    padding: 20px;
}

input{
    padding:10px;
    font-size:18px;
    width:250px;
}

button {
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    margin: 8px;
    transition: all 0.2s ease;
}
button {
    background: #2563eb;
    color: white;
}

button:hover {
    background: #1d4ed8;
    transform: scale(1.05);
}

button:active {
    transform: scale(0.98);
}

#numero {
    font-size: 100px;
    font-weight: bold;
    margin: 10px;
    color: #facc15;
    text-shadow: 5px 5px 10px rgba(0, 0, 0, 0.4);
}

.balota {
    display: inline-block;
    width: 40px;
    height: 40px;
    margin: 3px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    line-height: 40px;
    font-size: 14px;
    transition: all 0.2s ease;
    background: rgba(255,255,255,0.05);
}
#ultimos{
    font-size:24px;
    margin-top:5px;
}

#carton{
    margin:3px auto;

    background: rgba(255,255,255,0.08);

    padding:20px;

    border-radius:16px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.4);

    border: 1px solid rgba(255,255,255,0.12);
    display:inline-block;
}

/* TABLA DEL CARTÓN */
#carton table{
    margin:auto;
    border-collapse: separate;
    border-spacing: 8px;
    font-size:24px;
}

#carton td{
    width: 60px;
    height: 60px;

    text-align: center;
    vertical-align: middle;

    font-size: 18px;
    font-weight: bold;

    border-radius: 50%;

    background: white;

    border: 2px solid #d0d0d0;

    transition: all 0.25s ease;

    box-shadow: 0 2px 6px rgba(0,0,0,0.2);

    padding: 0;
    
}
#pantallaJuego{
    display:none;
    text-align:center;
}

/* encabezado BINGO */
#carton th{
    width: 60px;
    height: 60px;

    background: #111;
    color: white;

    font-size: 28px;
    font-weight: bold;

    border-radius: 12px;

    text-align: center;
}
#accionesJugador{
    margin-top:5px;
    display:flex;
    justify-content:center;
}
/* marcada por jugador */
.marcada{
    background: #22c55e !important;
    color: black;
}

/* coincidencia con número sorteado */
.coincidencia{
    background: #f4c542 !important;
    color: black;
    transform: scale(1.1);
    box-shadow: 0 0 12px rgba(244, 197, 66, 0.5);
    
}

</style>

</head>

<body>

<div id="pantallaIngreso">

```
<h1>BINGO MEDELLÍN</h1>

<h3>Nombre del jugador</h3>

<input
    type="text"
    id="nombreJugador"
    placeholder="Escribe tu nombre">

<br>

<button onclick="entrar()">
    Entrar
</button>

</div>

<div id="pantallaJuego">

<h1>BINGO MEDELLÍN</h1>

<h2 id="bienvenida"></h2>

<h3>Última Balota</h3>

<div id="numero">-</div>

<div id="ultimos">
    Anteriores: - | -
</div>

<div id="carton"></div>

<div id="accionesJugador">

    <button onclick="cantarBingo()">
        Cantar BINGO
    </button>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
function numeroAleatorio(min, max){

    return Math.floor(
        Math.random() * (max - min + 1)
    ) + min;

}

function generarColumna(inicio, fin){

    let numeros = [];

    while(numeros.length < 5){

        const numero =
            numeroAleatorio(inicio, fin);

        if(!numeros.includes(numero)){
            numeros.push(numero);
        }

    }

    return numeros;

}

function generarCarton(){

    const B = generarColumna(1,15);
    const I = generarColumna(16,30);
    const N = generarColumna(31,45);
    const G = generarColumna(46,60);
    const O = generarColumna(61,75);

    N[2] = "LIBRE";

    let html = `
        <table>
    
            <tr>
                <th>B</th>
                <th>I</th>
                <th>N</th>
                <th>G</th>
                <th>O</th>
            </tr>
    `;

    for(let fila = 0; fila < 5; fila++){

        html += "<tr>";

    html += `<td data-numero="${B[fila]}" onclick="marcar(this)">${B[fila]}</td>`;
    html += `<td data-numero="${I[fila]}" onclick="marcar(this)">${I[fila]}</td>`;
    html += `<td data-numero="${N[fila]}" onclick="marcar(this)">${N[fila]}</td>`;
    html += `<td data-numero="${G[fila]}" onclick="marcar(this)">${G[fila]}</td>`;
    html += `<td data-numero="${O[fila]}" onclick="marcar(this)">${O[fila]}</td>`; 

        html += "</tr>";
    }

    html += "</table>";

    document.getElementById("carton").innerHTML = html;
}

socket.on("connect", () => {
  console.log("🟢 Conectado al servidor:", socket.id);
});

let nombre = "";

function entrar(){

    nombre =
        document.getElementById("nombreJugador")
        .value
        .trim();

    if(nombre === ""){
        alert("Debes escribir tu nombre");
        return;
    }

    document.getElementById("pantallaIngreso")
        .style.display = "none";

    document.getElementById("pantallaJuego")
        .style.display = "block";

    document.getElementById("bienvenida")
        .innerText = "Bienvenido " + nombre;
        
        generarCarton();

}

function marcar(celda){

    celda.classList.remove("coincidencia");

    celda.classList.toggle("marcada");

}
function cantarBingo(){

    console.log("El jugador cantó BINGO");
    socket.emit("cantarBingo", nombre);

}

function resaltarCoincidencia(numero){

    // Quitar coincidencias anteriores
    document
        .querySelectorAll(".coincidencia")
        .forEach(celda => {

            if(!celda.classList.contains("marcada")){
                celda.classList.remove("coincidencia");
            }

        });

    // Buscar la nueva coincidencia
    const celda = document.querySelector(
        `[data-numero="${numero}"]`
    );

    if(celda && !celda.classList.contains("marcada")){
        celda.classList.add("coincidencia");
    }

}

socket.on("estadoBingo", (estado) => {

    document.getElementById("numero")
        .innerText = estado.ultimoNumero;
    
    resaltarCoincidencia(estado.ultimoNumero);

    let anteriores = "- | -";

    if(estado.sorteados.length >= 2){

        const ultimo =
            estado.sorteados.length - 2;

        const penultimo =
            estado.sorteados.length - 3;

        anteriores =
            (estado.sorteados[ultimo] || "-")
            + " | " +
            (estado.sorteados[penultimo] || "-");

    }

    document.getElementById("ultimos")
        .innerText =
        "Anteriores: " + anteriores;
socket.on("limpiarCartones", () => {

    document
        .querySelectorAll(".marcada")
        .forEach(celda => {
            celda.classList.remove("marcada");
        });

    document
        .querySelectorAll(".coincidencia")
        .forEach(celda => {
            celda.classList.remove("coincidencia");
        });

});

        
});

</script>

</body>

</html>
