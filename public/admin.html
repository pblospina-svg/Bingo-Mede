<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Bingo Mede</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:20px;
}

#numero{
    font-size:120px;
    font-weight:bold;
    margin:20px;
}

button{
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
}

#historial{
    margin-top:20px;
    padding:15px;
    border:1px solid #ccc;
    min-height:50px;
}

#restantes{
    margin-top:20px;
    font-size:20px;
}
#tablero{
    margin-top:20px;
    display:flex;
    justify-content:center;
    overflow-x:auto;
}

#tablero table{
    border-collapse:collapse;
    width:100%;
    max-width:1100px;
}

#tablero td{
    border:1px solid #999;

    width:55px;
    height:55px;

    text-align:center;
    vertical-align:middle;

    font-size:20px;
    font-weight:bold;
}

.letra{
    font-size:24px;
    padding:8px;
}

.sorteada{
    background-color:#4caf50;
    color:white;
}

.ultima{
    background-color:#ff8a8a;
    color:black;
}

.fila{
    margin:8px 0;
}

.letra{
    display:inline-block;
    width:35px;

    background-color:#333;
    color:white;

    font-weight:bold;
    text-align:center;

    padding:5px;
    border-radius:4px;
}

.balota{
    display:inline-block;

    width:40px;
    height:32px;

    line-height:32px;

    margin:1px;

    border:1px solid #bbb;

    text-align:center;

    border-radius:3px;
}

.sorteada{
    background-color:#3cb371;
    color:white;
}

.ultima{
    background-color:#ff8a8a;
    color:black;
    font-weight:bold;
    animation:pulseRojo 1s infinite;
}
@keyframes pulseRojo {
    0% {
        background-color:#ff8a8a;
        transform: scale(1);
    }
    50% {
        background-color:#ff5f5f;
        transform: scale(1.08);
    }
    100% {
        background-color:#ff8a8a;
        transform: scale(1);
    }
}

</style>

</head>

<body>

<h1>🎱 Bingo Mede</h1>

<h3>Última Balota</h3>

<div id="numero">-</div>

<button onclick="sacarNumero()">
Sacar Balota
</button>

<button onclick="nuevaPartida()">
🎱 Nueva Partida
</button>

<div id="restantes">
Balotas restantes: 75
</div>

<h3>Panel de Control</h3>

<div id="tablero"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

socket.on("estadoBingo", (estado) => {

    document.getElementById("numero").innerText =
        estado.ultimoNumero;

    dibujarTablero(estado);

    document.getElementById("restantes").innerText =
        "Balotas restantes: " +
        estado.disponibles.length;

});
function dibujarTablero(estado){

    const grupos = [
        ["B", 1, 15],
        ["I", 16, 30],
        ["N", 31, 45],
        ["G", 46, 60],
        ["O", 61, 75]
    ];

    let html = "<table>";

    grupos.forEach(grupo => {

        const letra = grupo[0];
        const inicio = grupo[1];
        const fin = grupo[2];

        html += "<tr>";

        html += `
            <td class="letra">
                ${letra}
            </td>
        `;

        for(let i = inicio; i <= fin; i++){

            let clase = "";

            if(estado.sorteados.includes(i)){
                clase = "sorteada";
            }

            if(i === estado.ultimoNumero){
                clase = "ultima";
            }

            html += `
                <td class="${clase}">
                    ${i}
                </td>
            `;
        }

        html += "</tr>";

    });

    html += "</table>";

    document.getElementById("tablero").innerHTML =
        html;
}

function sacarNumero(){

    socket.emit("sacarNumero");

}
function nuevaPartida(){

    socket.emit("nuevaPartida");

}

</script>

</body>

</html>
