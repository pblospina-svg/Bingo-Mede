<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Bingo Mede</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:20px;
}

#numero{
    font-size:120px;
    font-weight:bold;
    margin:20px;
}

button{
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
}

#historial{
    margin-top:20px;
    padding:15px;
    border:1px solid #ccc;
    min-height:50px;
}

#restantes{
    margin-top:20px;
    font-size:20px;
}
#tablero{
    margin-top:20px;
    text-align:left;
    display:inline-block;
}

.fila{
    margin:8px 0;
}

.letra{
    font-weight:bold;
    font-size:24px;
    display:inline-block;
    width:30px;
}

.balota{
    display:inline-block;
    width:35px;
    padding:5px;
    margin:2px;
    border:1px solid #ccc;
    border-radius:4px;
    text-align:center;
}

.sorteada{
    background-color:#4caf50;
    color:white;
}

.ultima{
    background-color:#f8edb8;
}

</style>

</head>

<body>

<h1>🎱 Bingo Mede</h1>

<h3>Última Balota</h3>

<div id="numero">-</div>

<button onclick="sacarNumero()">
Sacar Balota
</button>

<button onclick="nuevaPartida()">
🎱 Nueva Partida
</button>

<div id="restantes">
Balotas restantes: 75
</div>

<h3>Panel de Control</h3>

<div id="tablero"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

socket.on("estadoBingo", (estado) => {

    document.getElementById("numero").innerText =
        estado.ultimoNumero;

    dibujarTablero(estado);

    document.getElementById("restantes").innerText =
        "Balotas restantes: " +
        estado.disponibles.length;

});
function dibujarTablero(estado){

    const grupos = [
        ["B", 1, 15],
        ["I", 16, 30],
        ["N", 31, 45],
        ["G", 46, 60],
        ["O", 61, 75]
    ];

    let html = "";

    grupos.forEach(grupo => {

        const letra = grupo[0];
        const inicio = grupo[1];
        const fin = grupo[2];

        html += `
            <div class="fila">
                <span class="letra">${letra}</span>
        `;

        for(let i = inicio; i <= fin; i++){

            let clase = "balota";

            if(estado.sorteados.includes(i)){
                clase += " sorteada";
            }

            if(i === estado.ultimoNumero){
                clase += " ultima";
            }

            html += `
                <span class="${clase}">
                    ${i}
                </span>
            `;
        }

        html += "</div>";

    });

    document.getElementById("tablero").innerHTML =
        html;

}

function sacarNumero(){

    socket.emit("sacarNumero");

}
function nuevaPartida(){

    socket.emit("nuevaPartida");

}

</script>

</body>

</html>
