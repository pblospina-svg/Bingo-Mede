<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Bingo Medellín</title>

<style>

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    color: rgb(0, 0, 0);
    text-align: center;
    margin: 0;
    padding: 20px;
}

#numero {
    font-size: 140px;
    font-weight: bold;
    margin: 10px;
    color: #facc15;
    text-shadow: 5px 5px 10px rgba(0, 0, 0, 0.4);
}

button{
    width:220px;

    height:60px;

    font-size:20px;
    font-weight:bold;

    border:none;
    border-radius:15px;

    cursor:pointer;

    margin:3px;

    transition:all .2s ease;
}
button:hover{
    transform:translateY(-2px);

    box-shadow:0 4px 10px rgba(0,0,0,.25);
}

#historial{
    margin-top:5px;
    padding:15px;
    border:1px solid #ccc;
    min-height:50px;
}

#restantes{
    margin-top:5px;
    font-size:20px;
}

#tablero{
    margin-top:5px;

    display:flex;
    justify-content:center;

    padding:20px;

    border:4px solid #c62828;
    border-radius:20px;

    background:#fafafa;

    width:max-content;
    margin-left:auto;
    margin-right:auto;
}
#tablero table {
    border-collapse: separate;
    border-spacing: 8px;
    margin: auto;

    background: #f8a7a7c4;

    padding: 15px;

    border-radius: 20px;
}

#tablero td {

    width: 60px;
    height: 60px;

    min-width: 60px;
    max-width: 60px;

    min-height: 60px;
    max-height: 60px;

    line-height: 60px;

    text-align: center;
    vertical-align: middle;

    font-size: 26px;
    font-weight: 900;

    text-shadow:
        1px 1px 0 rgba(255,255,255,0.7),
        -1px -1px 0 rgba(0,0,0,0.15);

    border-radius: 50%;

    background: white;

    border: 2px solid #d0d0d0;

    transition: all 0.25s ease;

    box-shadow: 0 2px 6px rgba(0,0,0,0.2);

    padding: 0;
}

#tablero td:hover {
    transform: scale(1.05);
    cursor: pointer;
}
.letra{
    font-size:24px;
    padding:8px;
}

.fila{
    margin:8px 0;
}

.letra{
    background: #111 !important;
    color: white !important;

    width: 60px;
    height: 60px;

    font-size: 32px;
    font-weight: bold;

    text-align: center;
    vertical-align: middle;

    border-radius: 12px;

    border: 2px solid white;
}

.sorteada{
    background:#43a047 !important;
    color:white;
    border-color:#2e7d32;
}

.ultima{
    background: #ff0404 !important;
    color: rgb(247, 243, 243) !important;

    transform: scale(1.15);

    box-shadow: 0 0 15px rgba(244, 197, 66, 0.7);

    border: 2px solid #d4a017;
}

@keyframes pulseRojo {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

#alertaBingo{
    margin-top:5px;
    font-size:28px;
    font-weight:bold;
    color:#d32f2f;
    min-height:25px;
}
#controles{
    display:flex;
    justify-content:center;
    gap:8px;

    margin:5px 0;
}

</style>

</head>

<body>

<h1>BINGO MEDELLÍN</h1>

<h3>Última Balota</h3>


<div id="numero">-</div>

<div id="controles">

    <button onclick="sacarNumero()">
        Sacar Balota
    </button>

    <button onclick="nuevaPartida()">
        Reiniciar
    </button>

</div>


<div id="alertaBingo"></div>

<div id="restantes">
Balotas restantes: 75
</div>

<div id="tablero"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

socket.on("estadoBingo", (estado) => {

    document.getElementById("numero").innerText = estado.ultimoNumero;

    dibujarTablero(estado);

    document.getElementById("restantes").innerText =
        "Balotas restantes: " + estado.disponibles.length;

    // 👇 LIMPIEZA SEGURA
    document.getElementById("alertaBingo").innerText = "";
});

socket.on("bingoCantado", (nombre) => {

    document.getElementById("alertaBingo")
        .innerText =
        "⚠ " + nombre + " ha cantado BINGO";

});

socket.on("limpiarBingo", () => {
    document.getElementById("alertaBingo").innerText = "";
});

function dibujarTablero(estado){

    const grupos = [
        ["B", 1, 15],
        ["I", 16, 30],
        ["N", 31, 45],
        ["G", 46, 60],
        ["O", 61, 75]
    ];

    let html = "<table>";

    grupos.forEach(grupo => {

        const letra = grupo[0];
        const inicio = grupo[1];
        const fin = grupo[2];

        html += "<tr>";

        html += `
            <td class="letra">
                ${letra}
            </td>
        `;

        for(let i = inicio; i <= fin; i++){

            let clase = "";

            if(estado.sorteados.includes(i)){
                clase = "sorteada";
            }

            if(i === estado.ultimoNumero){
                clase = "ultima";
            }

            html += `
                <td class="${clase}">
                    ${i}
                </td>
            `;
        }

        html += "</tr>";

    });

    html += "</table>";

    document.getElementById("tablero").innerHTML =
        html;
}

function sacarNumero(){

    socket.emit("sacarNumero");

}
function nuevaPartida(){

    socket.emit("nuevaPartida");

}

</script>

</body>

</html>
