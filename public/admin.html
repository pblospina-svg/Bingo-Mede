<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Bingo Mede</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin:20px;
}

#numero{
    font-size:120px;
    font-weight:bold;
    margin:20px;
}

button{
    padding:15px 30px;
    font-size:20px;
    cursor:pointer;
}

#historial{
    margin-top:20px;
    padding:15px;
    border:1px solid #ccc;
    min-height:50px;
}

#restantes{
    margin-top:20px;
    font-size:20px;
}
#tablero {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    overflow-x: auto;

    padding: 10px;
    border-radius: 15px;
}
#tablero table {
    border-collapse: separate;
    border-spacing: 8px;
    margin: auto;

    background: rgba(255,255,255,0.03);
    padding: 10px;
    border-radius: 12px;
}

#tablero td {
    width: 60px;
    height: 60px;

    text-align: center;
    vertical-align: middle;

    font-size: 18px;
    font-weight: bold;

    border-radius: 12px;

    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);

    transition: all 0.25s ease;

    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
#tablero td:hover {
    transform: scale(1.05);
    cursor: pointer;
}
.letra{
    font-size:24px;
    padding:8px;
}

.fila{
    margin:8px 0;
}

.letra{
    display:inline-block;
    width:35px;

    background-color:#333;
    color:white;

    font-weight:bold;
    text-align:center;

    padding:5px;
    border-radius:4px;
}

.sorteada {
    background: linear-gradient(135deg, #22c55e, #16a34a) !important;
    color: black;
    transform: scale(0.98);
}

.ultima {
    background: linear-gradient(135deg, #ef4444, #dc2626) !important;
    color: white;

    transform: scale(1.08);

    box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
}

@keyframes pulseRojo {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

#alertaBingo{
    margin-top:20px;
    font-size:28px;
    font-weight:bold;
    color:#d32f2f;
    min-height:40px;
}

</style>

</head>

<body>

<h1>🎱 Bingo Mede</h1>

<h3>Última Balota</h3>

<div id="numero">-</div>

<button onclick="sacarNumero()">
Sacar Balota
</button>

<button onclick="nuevaPartida()">
🎱 Nueva Partida
</button>

<div id="alertaBingo"></div>

<div id="restantes">
Balotas restantes: 75
</div>

<h3>Panel de Control</h3>

<div id="tablero"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

socket.on("estadoBingo", (estado) => {

    document.getElementById("numero").innerText =
        estado.ultimoNumero;

    dibujarTablero(estado);

    document.getElementById("restantes").innerText =
        "Balotas restantes: " + estado.disponibles.length;

});

socket.on("bingoCantado", (nombre) => {

    document.getElementById("alertaBingo")
        .innerText =
        "⚠ " + nombre + " ha cantado BINGO";

});

function dibujarTablero(estado){

    const grupos = [
        ["B", 1, 15],
        ["I", 16, 30],
        ["N", 31, 45],
        ["G", 46, 60],
        ["O", 61, 75]
    ];

    let html = "<table>";

    grupos.forEach(grupo => {

        const letra = grupo[0];
        const inicio = grupo[1];
        const fin = grupo[2];

        html += "<tr>";

        html += `
            <td class="letra">
                ${letra}
            </td>
        `;

        for(let i = inicio; i <= fin; i++){

            let clase = "";

            if(estado.sorteados.includes(i)){
                clase = "sorteada";
            }

            if(i === estado.ultimoNumero){
                clase = "ultima";
            }

            html += `
                <td class="${clase}">
                    ${i}
                </td>
            `;
        }

        html += "</tr>";

    });

    html += "</table>";

    document.getElementById("tablero").innerHTML =
        html;
}

function sacarNumero(){

    socket.emit("sacarNumero");

}
function nuevaPartida(){

    socket.emit("nuevaPartida");

}

</script>

</body>

</html>
